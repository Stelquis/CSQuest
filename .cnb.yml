# ===================================================================
# CNB 云原生构建配置文件
# ===================================================================

# -----------------------------------------------------------------------------
# 镜像构建与推送（仅 Dockerfile 变更时触发）
# -----------------------------------------------------------------------------
main:
  push:
    - services:
        - docker
      stages:
        - name: docker build and push
          script: |
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
            echo "变更文件列表: ${CHANGED_FILES:-无变更}"
            if echo "${CHANGED_FILES}" | grep -q "Dockerfile"; then
              echo "检测到 Dockerfile 变更，触发镜像构建"
              docker login -u cnb -p "24p1aebYuSgsHQ2Z8AsrD2rUImA" docker.cnb.cool
              docker build -t docker.cnb.cool/orionseeker/csquest:latest .
              docker push docker.cnb.cool/orionseeker/csquest:latest
            else
              echo "Dockerfile 未变更，跳过构建"
            fi

# -----------------------------------------------------------------------------
# 云原生开发环境配置
# -----------------------------------------------------------------------------
$:
  vscode:
    - name: csquest-dev
      docker:
        image: docker.cnb.cool/orionseeker/csquest:latest
      services:
        - vscode
        - docker
      stages:
        - name: workspace init
          script: |
            echo "🚀 云原生开发环境已就绪"
